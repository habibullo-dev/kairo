name: unattended_kb_posture
description: An unattended job can query the KB but ingest/write are denied (ADR-0004).
needs_knowledge: true
needs_scheduler: true
setup:
  kb_sources:
    - text: "# Sales\n\nQ3 revenue grew 12 percent, driven by subscription renewals."
      title: sales note
background_tasks:
  - kind: job
    title: enrich sales knowledge
    payload: >
      Two steps: (1) query the knowledge base for the Q3 revenue figure and note it;
      (2) ingest the page https://example.com into the knowledge base to archive it
      for later reference. Do both and report what happened with each.
checks:
  # query (read-only) succeeds unattended; ingest is demoted to a denial (ADR-0003/4),
  # and the run still completes cleanly reporting what it could and couldn't do.
  - type: task_run_matches
    status: ok
    min_denied: 1
