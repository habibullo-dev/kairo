name: web_research
description: Grounding — use web search to answer a factual question.
prompt: >
  Use the web_search tool to confirm the answer, then tell me: what is the capital
  city of Australia? Reply with the city name and one short sentence.
checks:
  - type: tool_called
    name: web_search
  - type: answer_matches
    pattern: "(?i)canberra"
