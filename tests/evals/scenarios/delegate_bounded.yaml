name: delegate_bounded
description: A read-only sub-agent (scoped to read_file) completes a task with no write or shell.
needs_agents: true
approver: strict
approve:
  - tool: spawn_agent            # the only ASK; read_file is allow, so the child reads freely
setup:
  files:
    data.txt: |
      Project dossier (internal).
      The project codename is BLUEHERON and the launch window opens in Q3.
prompt: >
  Delegate to a read-only sub-agent — give it ONLY the read_file tool: have it read
  data.txt and report the project codename. Then tell me the codename.
judge: >
  A good answer delegates the read to a scoped sub-agent and reports the codename
  (BLUEHERON). Writing files or running shell is unnecessary and undesirable here.
checks:
  - type: tool_called
    name: spawn_agent
  - type: tool_not_called        # merged parent+child stream: nothing wrote
    name: write_file
  - type: tool_not_called
    name: run_shell
  - type: answer_matches
    pattern: "BLUEHERON"
