<!DOCTYPE html>
<!-- Appearance is applied to <html> (theme.js, from localStorage); the defaults below avoid a
     flash before the module runs. <body> stays plain (no class/attr). -->
<html lang="en" data-theme="noir" data-density="comfortable" data-layout="focused">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Kairo Workstation</title>
  <link rel="stylesheet" href="/static/kairo.css">
</head>
<body>
  <nav class="rail">
    <div class="brand">
      <svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <path d="M11 4.5H21L27.5 16L21 27.5H11L4.5 16Z" stroke="#2E3B4E" stroke-width="1.4" fill="#0D1522"/>
        <path d="M15.7 15.6V7" stroke="#FFB020" stroke-width="1.9" stroke-linecap="round"/>
        <path d="M15.7 15.6L23 9" stroke="#17D2FF" stroke-width="1.9" stroke-linecap="round"/>
        <path d="M15.7 15.6L22.4 22.6" stroke="#17D2FF" stroke-width="1.9" stroke-linecap="round"/>
        <circle cx="15.7" cy="15.6" r="2.5" fill="#FFB020"/>
        <circle cx="22.4" cy="22.6" r="2.1" fill="#0D1522" stroke="#FFB020" stroke-width="1.6"/>
      </svg>
      <span class="name">KAIRO</span>
    </div>
    <!-- Primary rail: the five places you live in. Vault/Tasks/Memory moved into the project
         Workspace as tabs (T10); they stay reachable by hash until then. -->
    <a href="#daily" data-screen="daily"><span class="dot"></span><span class="label">Daily</span></a>
    <a href="#projects" data-screen="projects"><span class="dot"></span><span class="label">Projects</span></a>
    <a href="#studio" data-screen="studio"><span class="dot"></span><span class="label">Studio</span></a>
    <a href="#costs" data-screen="costs"><span class="dot"></span><span class="label">Costs</span></a>
    <a href="#settings" data-screen="settings"><span class="dot"></span><span class="label">Settings</span></a>
    <div class="spacer"></div>
    <!-- Utility area: tools and surfaces you dip into. Gate keeps its persistent pending badge. -->
    <div class="rail-cap">Tools</div>
    <a href="#gate" data-screen="gate"><span class="dot"></span><span class="label">Gate</span><span class="badge" id="gate-badge">0</span></a>
    <a href="#trace" data-screen="trace"><span class="dot"></span><span class="label">Trace</span></a>
    <a href="#hub" data-screen="hub"><span class="dot"></span><span class="label">Hub</span></a>
    <a href="#lab" data-screen="lab"><span class="dot"></span><span class="label">Lab</span></a>
    <a href="#meetings" data-screen="meetings"><span class="dot"></span><span class="label">Meetings</span><span class="rec-dot" id="rec-dot"></span></a>
    <div class="foot">Local AI Workstation</div>
  </nav>

  <header class="status">
    <div class="runner">
      <span class="runner-dot" id="runner-dot"></span>
      <span class="label" id="st-runner">Kairo is idle</span>
    </div>
    <div class="ctx dbg-only-inline" id="st-ctx"><span id="st-turn">ready</span></div>
    <div class="statusline">
      <span class="chip" id="st-project" title="Active project">global</span>
      <span class="chip" id="st-mode" title="Run mode">approval</span>
      <span class="chip" id="st-spend" title="Today's LLM spend">$0.0000</span>
      <span class="chip warn" id="st-ledger" title="Cost tracking degraded" style="display:none">cost ⚠</span>
    </div>
    <span class="grow"></span>
    <div class="voice">voice <b id="st-voice">off</b></div>
    <button id="st-mic" style="display:none">🎤 Talk</button>
    <div class="theme-toggle" id="theme-toggle" title="Appearance theme">
      <button data-theme-choice="noir">Noir</button>
      <button data-theme-choice="light">Light</button>
      <button data-theme-choice="neon">Neon</button>
    </div>
    <div class="mode-toggle">
      <button id="mode-daily" class="active">Daily</button>
      <button id="mode-debug"><span class="dbg-dot"></span>Debug</button>
    </div>
    <button class="stop-btn" id="st-stop">Stop</button>
    <button class="stop-btn" id="st-resume" style="display:none">Resume</button>
  </header>

  <main>
    <div id="screen" class="screen"></div>
  </main>

  <!-- The approval overlay: the single priority attention surface (amber). -->
  <div class="overlay" id="overlay">
    <div class="approve-card">
      <div class="head">
        <div class="ico">⚠</div>
        <div>
          <div class="k" id="ap-kind">Approval required</div>
          <div class="tool" id="ap-tool"></div>
        </div>
      </div>
      <div class="bd">
        <div class="label">Exact action · exact payload</div>
        <pre id="ap-payload"></pre>
        <div class="label">Why Kairo wants this</div>
        <div class="reason" id="ap-reason"></div>
      </div>
      <div class="waiting"><span class="spin" id="ap-spin"></span><span id="ap-waiting">Preparing secure confirmation…</span></div>
      <div class="actions">
        <button class="btn-approve" id="ap-approve" disabled>Approve once</button>
        <button class="btn-always" id="ap-always" disabled>Always allow</button>
        <button class="btn-deny" id="ap-deny">Deny</button>
      </div>
    </div>
  </div>

  <script type="module" src="/static/app.js"></script>
</body>
</html>
