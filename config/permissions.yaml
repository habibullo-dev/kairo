default: ask
tools:
  read_file: allow
  list_dir: allow
  glob_search: allow
  write_file: ask
  run_shell: ask
  web_search: allow
  web_fetch: ask
  recall: allow
  remember: ask
  forget: ask
  list_tasks: allow
  schedule_task: ask
  cancel_task: ask
  query_knowledge_base: allow
  lint_knowledge_base: allow
  ingest_source: ask
  write_wiki_page: ask
  spawn_agent: ask
filesystem:
  write_allowlist:
  - .
  write_denylist:
  - data/knowledge
  - config/skills
  read_allowlist:
  - .
  read_denylist: []
shell:
  rules:
  - prefix: git status
    decision: allow
  - prefix: git diff
    decision: allow
  - prefix: git log
    decision: allow
  - prefix: 'rm '
    decision: ask
  - prefix: 'del '
    decision: ask
