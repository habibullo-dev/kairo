# Non-secret configuration. Secrets (API keys) live in .env — never here.
# Every value has a code default in src/jarvis/config.py; this file overrides them.

models:
  # Quality-first: the most capable model at every tier (API cost is not a constraint).
  main: claude-opus-4-8       # the agent's reasoning + tool-use model
  utility: claude-sonnet-5    # summarization / memory extraction (NOT a small model,
                              # so background work can't silently corrupt context/memory)
  judge: claude-opus-4-8      # LLM-as-judge for evals (phase 5)
  embedding: voyage-3-large   # long-term memory embeddings (phase 2)

limits:
  max_iterations: 25            # hard stop on the agent loop (runaway guard)
  tool_timeout_seconds: 60      # per-tool execution timeout
  max_tool_result_chars: 24000  # truncate tool output (~6k tokens) to protect context
  context_token_budget: 180000  # compaction target headroom below the 1M window
  compaction_threshold: 0.7     # compact when history exceeds this fraction of the budget
  max_output_tokens: 32000      # we stream, so this sits well under the 128k cap
  effort: high                  # output_config effort: low|medium|high|xhigh|max
  max_retries: 4                # SDK retries 429/5xx with exponential backoff

memory:
  # Long-term memory (Phase 2). Thresholds are voyage-3-large-specific; tune from
  # real recall logs. Set enabled: false (or omit VOYAGE_API_KEY) to run without it.
  enabled: true
  top_k: 6              # max memories auto-recall injects into the system prompt
  min_similarity: 0.35  # cosine floor for a recall hit
  dedup_trigger: 0.85   # cosine above which remember() asks sonnet-5 to adjudicate
  reflection: true      # distill durable facts from the transcript at session end

scheduler:
  # Tasks & scheduling (Phase 3): reminders + unattended background jobs.
  enabled: true
  misfire_grace_seconds: 3600    # due-jobs older than this on catch-up are 'missed', not run
  max_consecutive_failures: 3    # recurring job flips 'failed' after this many errors
  wake_cap_seconds: 30           # loop re-checks at least this often (survives laptop sleep)
  max_job_iterations: 15         # unattended runaway bound (a denied-everything loop must not thrash)
  reflect_job_sessions: false    # unattended transcripts do NOT feed long-term memory by default
  unattended_allow_tools: []     # explicit opt-in: tools whose policy-ALLOW survives unattended demotion

knowledge:
  # Research + knowledge base (Phase 4): ingest files/webpages/notes into an
  # Obsidian-compatible Markdown wiki with provenance + citations. Embeddings reuse
  # models.embedding (needs VOYAGE_API_KEY, like memory). enabled: false to turn off.
  enabled: true
  dir: data/knowledge            # raw/ markdown/ wiki/ live here; point at a git-versioned
                                 # dir (or an Obsidian vault) to version your wiki (data/ is gitignored)
  pdf_converter: markitdown      # 'docling' (better tables/layout) needs `uv sync --extra docling`
  chunk_chars: 2000              # max chunk size; heading-aware splitter
  min_chunk_chars: 200           # tiny sections merge forward
  top_k: 8                       # query_knowledge_base default
  min_similarity: 0.30           # cosine floor for a chunk hit (voyage-3-large; tune from logs)
  max_ingest_bytes: 50000000     # raw input cap; zip members are ALSO capped uncompressed
  convert_timeout_seconds: 120   # subprocess wall-clock kill (Docling on CPU is slow)

sub_agents:
  # Multi-agent delegation (Phase 6): the parent agent can spawn scoped sub-agents
  # with isolated contexts and per-spawn tool allowlists. Every spawn is human-approved
  # (never "always"-able); children can't spawn (depth 1) and can't run unattended.
  # Set enabled: false to remove spawn_agent from the toolset entirely.
  enabled: true
  model:                        # child model; blank = inherit models.main (quality-first, no downgrade)
  max_iterations: 15            # a child is bounded tighter than the interactive parent's 25
  timeout_seconds: 600          # wall-clock per child run (service-enforced, not the executor)
  max_parallel: 4               # concurrency semaphore (a resource bound, NOT a safety bound)
  max_spawn_calls_per_turn: 8   # runaway/UX guard: cap spawn calls in one parent turn (not a safety bound)

modes:
  # Run modes (Phase 10): plan | approval | auto. Backend-enforced in the agent loop; never
  # a bypass of the PermissionGate or the Phase 9 egress-taint guard. Applies to interactive
  # surfaces only — background jobs keep the UnattendedGate, voice is pinned to approval.
  default: approval             # the mode a fresh interactive surface starts in
  # Auto mode auto-approves ONLY the tools listed here, and ONLY when the decision is still
  # persistable (a tainted-egress ASK always reaches you). run_shell / write_file can NEVER
  # be added (enforced in code). Empty = Auto adds no standing authority.
  auto_allow_tools: []

budgets:
  # Cost budgets + ROI inputs (Phase 10). 0 / null means "no limit". Per-run limits gate an
  # orchestration run's accumulated spend; project_monthly caps month-to-date per project;
  # confirm_above triggers a two-step confirm before an expensive run. Unpriced role models
  # block orchestration by default (fail-closed). Project overrides in the project's settings.
  soft_warn_usd_per_run: 1.0
  hard_stop_usd_per_run: 5.0
  project_monthly_usd:            # blank = no monthly cap
  per_role_max_usd:               # blank = no per-role cap
  confirm_above_usd: 2.0
  max_rounds: 3                   # orchestration revise-loop cap
  hourly_rate_usd: 100.0          # ROI: the human-time value a workflow saves
  treat_unpriced_as_blocking: true

voice:
  # Voice interface (Phase 7). Push-to-talk MVP; wake-word activation is deferred. Voice
  # is read-only by default and NEVER approves risky actions by voice — those escalate to
  # an on-screen typed confirmation. Safety floor: docs/PLAN-7-voice-permissions-checkpoint.md.
  enabled: false                 # opt-in; off = byte-identical to Phase 6
  cloud_providers: false         # explicit opt-in for third-party STT/TTS (audio leaves the machine)
  stt_provider: local            # 'local' (faster-whisper) | 'openai' (cloud; needs cloud_providers)
  tts_provider: local            # 'local' (OS/offline) | 'elevenlabs' (cloud; needs cloud_providers)
  tts_voice:                     # provider-specific voice id (blank = provider default)
  wake_word:                     # DEFERRED: designed + tested, not activated in the MVP
  retain_audio: false            # keep the transcript (untrusted); discard raw audio by default
  endpoint_silence_seconds: 0.8  # push-to-talk: silence that ends an utterance
  long_turn_ack_seconds: 1.5     # speak a brief "working on it" ack if a turn runs longer

ui:
  # Workstation UI (Phase 8). An authenticated LOCAL peer of the REPL — same AgentLoop,
  # same PermissionGate/VoiceApprover, no new authority. Off = byte-identical to Phase 7.
  # Safety floor: docs/PLAN-8-ui.md + ADR-0008. Approvals are explicit, audited, replay-proof.
  enabled: false                 # opt-in; start with `jarvis --ui`
  host: 127.0.0.1                # LOOPBACK ONLY — a non-loopback host is refused at load
  port: 8787
  heartbeat_seconds: 15.0        # approval/voice-screen liveness window (dead client can't approve)
  ring_buffer_events: 2000       # Trace screen scrollback

connectors:
  # External connectors (Phase 9): Google Calendar/Gmail/Drive, Telegram + Kakao
  # notifications, and the Daily Digest. All OFF by default. Reads are silent+audited and
  # framed untrusted; anything that sends/creates asks first and is denied unattended.
  # Secrets (GOOGLE_CLIENT_ID/SECRET, TELEGRAM_BOT_TOKEN, KAKAO_REST_API_KEY) live in .env.
  # Safety floor: docs/PLAN-9-daily.md + ADR-0009/ADR-0010.
  demo: false                    # populate Daily/Hub with clearly-badged FAKE data (no OAuth);
                                 # ignored when real provider keys are present (never masks live)
  google:
    enabled: false               # needs GOOGLE_CLIENT_ID/SECRET + one-time `jarvis connect google`
    calendar_id: primary
    max_results: 25
  telegram:
    enabled: false               # send-only; needs TELEGRAM_BOT_TOKEN in .env
    chat_id: ''                  # numeric chat id as a string (a routing id, NOT a secret)
    notify_reminders: false      # also mirror scheduler reminders to Telegram
  kakao:
    enabled: false               # "send to me" memo; needs KAKAO_REST_API_KEY + `jarvis connect kakao`
    redirect_port: 8788          # MUST match the redirect URI registered in the Kakao dev console
  digest:
    enabled: false               # scheduled Daily Digest (deterministic collectors + 1 summarize)
    cron: '0 8 * * *'            # local-tz 5-field crontab
    deliver: [ui]                # subset of {ui, telegram, kakao}; a channel needs its notifier on
    rich_notify: false           # notifiers get headers/counts by default; true adds snippets
    max_notify_chars: 3500
  repos: ['.']                   # repos whose git state feeds the Daily "what changed" card

paths:
  data_dir: data   # SQLite db (relative to project root)
  logs_dir: logs   # JSON-lines audit/trace logs
