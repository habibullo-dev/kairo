# Versioned model pricing for the Phase 10 cost ledger. USD per 1,000,000 tokens.
# Keyed by provider then model so lookups can't cross provider price spaces (pre-mortem #15):
# Anthropic tolerates dated-snapshot suffixes via longest-prefix match; other providers are
# matched EXACTLY, so an unknown model fails closed (cost_usd NULL + a warning), never a
# silent $0. Update `effective` + bump `schema_version` on a real change; unknown-here models
# are treated as unpriced (the code table in observability/cost.py is the Anthropic fallback).
schema_version: 2
effective: "2026-07-08"
cache_multipliers:
  write: 1.25   # 5-minute ephemeral cache write, vs the input rate
  read: 0.10    # cache hit, vs the input rate
models:
  anthropic:
    claude-fable-5: {input: 10.0, output: 50.0}
    claude-mythos-5: {input: 10.0, output: 50.0}
    claude-opus-4-8: {input: 5.0, output: 25.0}
    claude-opus-4-7: {input: 5.0, output: 25.0}
    claude-opus-4-6: {input: 5.0, output: 25.0}
    claude-sonnet-5: {input: 3.0, output: 15.0}
    claude-sonnet-4-6: {input: 3.0, output: 15.0}
    claude-haiku-4-5: {input: 1.0, output: 5.0}
  openai:
    # Example OpenAI text-only analysis models. EXACT match only (no prefix) — an unlisted
    # model is unpriced and fails closed. Fill in real ids/prices before routing a role here.
    gpt-5.2: {input: 1.75, output: 14.0}
    gpt-5.2-mini: {input: 0.30, output: 2.40}
  # --- Phase 10C direct provider workers (EXACT match only; unlisted model ⇒ unpriced ⇒
  # blocked). Prices per 1M tokens, verified from official provider docs 2026-07-08. ---
  deepseek:
    deepseek-v4-pro: {input: 0.435, output: 0.87}
    deepseek-v4-flash: {input: 0.14, output: 0.28}
  zai:
    glm-5.1: {input: 1.0, output: 3.2}
    glm-4.7: {input: 0.6, output: 2.2}
    glm-4-air: {input: 0.1, output: 0.3}
  gemini:
    # Flat-rate text tiers only. The tiered (>200k-token) Pro models are intentionally omitted
    # ⇒ unpriced ⇒ blocked until the pricing table can represent context-tiered rates.
    gemini-3.5-flash: {input: 1.5, output: 9.0}
    gemini-2.5-flash: {input: 0.3, output: 2.5}
  # Phase 15: embedding provider (Voyage). Embeddings have input tokens only (output: 0). The
  # memory-graph indexer + unified search fail CLOSED without this row. Verify vs the invoice.
  voyage:
    voyage-3-large: {input: 0.06, output: 0.0}
    voyage-3: {input: 0.02, output: 0.0}
  # Qwen (DashScope International/Singapore endpoint — matches the provider base_url). Qwen3-Coder
  # is CONTEXT-TIERED by request input size (plus: $1/$5 ≤32K, $1.80/$9 32-128K, $3/$15 128-256K,
  # $6/$60 256K-1M; flash: $0.30/$1.50, $0.50/$2.50, $0.80/$4, $1.60/$9.60 across the same bands).
  # The pricing table can't express tiers, so these are REPRESENTATIVE flat rates at the 32K–128K
  # band for cost tracking — verify vs the DashScope invoice. Numbers provided by Habib (2026-07-09).
  qwen:
    qwen3-coder-plus: {input: 1.8, output: 9.0}
    qwen3-coder-flash: {input: 0.5, output: 2.5}

# Phase 10B team services with a METERED cost model. A metered service NOT listed here is
# treated as unpriced and fails closed (its tool won't be available). Local free tools
# (semgrep/gitleaks/playwright_local) are fixed_zero in the catalog and need NO entry here.
# usd_per_unit is per the service's `unit` (a page crawled, a search, an image, …). Fill in
# real numbers before enabling any metered service; none are enabled in 10B.
services:
  # Firecrawl bills 1 credit per page scraped; ~$0.00083/credit at the 100k-credit tier ($83/mo),
  # more on smaller tiers. 0.001 is a slightly conservative per-page estimate — CONFIRM the exact
  # plan rate before the live ritual (plan §1). Source: firecrawl.dev/pricing (2026-07).
  firecrawl: {unit: page, usd_per_unit: 0.001}
  # Exa bills $5 / 1K searches = $0.005/search (verified: exa.ai/pricing, 2026-07; a March-2026
  # update cut deep-search 20% — confirm the current rate before the live ritual, plan §1).
  exa: {unit: search, usd_per_unit: 0.005}
  # OpenAI gpt-image-1, 1024x1024 MEDIUM quality ≈ $0.07/image (token-priced: ~$0.02/$0.07/$0.19
  # low/med/high; platform.openai.com/docs/pricing, 2026-07). The adapter pins size+quality, so a
  # per-image rate is exact for that config — confirm before the live ritual (plan §1).
  openai_image: {unit: image, usd_per_unit: 0.07}
